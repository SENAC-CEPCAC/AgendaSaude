<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="/css/perfilPaciente.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <div class="login-paciente">
        <h2 class="text-3xl font-bold">Login</h2>
        <h4 class="email text-sm">Email</h4>
        <input class="input input border-1 border-gray-300 rounded-md" type="email" name="email" id="email" placeholder="Digite seu e-mail">
        <h4 class="text-sm">Senha</h4>
        <input class="input border-1 border-gray-300 rounded-md" type="password" name="senha" id="Senha" placeholder="Digite sua senha">
        <h2 class="ml-30 text-xs esqueci">Esqueci a senha</h2>
        <input type="checkbox">
      <a class="lembrar ml- text-sm" >Lembrar senha</a>
        <button class="butao bg-clip-border px-22 py-1 bg-blue-900 text-white rounded-lg "  type="submit">Entrar</button>
        
    </div>
</body>

</html>
