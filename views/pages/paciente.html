<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paciente</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">    
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="../../css/pagepadrao.css" >
    
    
</head>
<body>

    <!-- SIDEBAR -->
    <aside>
        <div class="brand">
            <div class="brand-logo">G</div>
            <div class="brand-info">
                <h2>Portal Gestão</h2>
                <span>Administrador</span>
            </div>
        </div>
        <div class="menu-container">
            <ul class="menu-list">
                <li class="menu-item">
                    <a href="#"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                </li>
                <li class="menu-item">
                    <a href="#"><i data-lucide="calendar"></i> Agendamentos</a>
                </li>
                <li class="menu-item">
                    <a href="#"><i data-lucide="list"></i> Lista de Espera</a>
                </li>
                <li class="menu-item">
                    <a href="#"><i data-lucide="truck"></i> Unidades Móveis</a>
                </li>
                <li class="menu-item active">
                    <a href="#"><i data-lucide="users"></i> Pacientes</a>
                </li>
                <li class="menu-item ">
                    <a href="colaborador.html"><i data-lucide="contact"></i> Colaborador</a>
                </li>
                <li class="menu-item">
                    <a href="#"><i data-lucide="bar-chart-2"></i> Relatórios</a>
                </li>
            </ul>

            <ul class="menu-list">
                <li class="menu-item">
                    <a href="#"><i data-lucide="settings"></i> Configurações</a>
                </li>
                <li class="menu-item">
                    <a href="#"><i data-lucide="log-out"></i> Sair</a>
                </li>
            </ul>
        </div>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main>
        <!-- HEADER -->
        <header>
            <div class="header-icon"><i data-lucide="bell"></i></div>
            <div class="header-icon"><i data-lucide="user-circle"></i></div>
        </header>

        <!-- ÁREA DE CONTEÚDO -->
        <div class="content-container">
            <h1 class="page-title">PACIENTE</h1>

            <!-- FILTROS -->
            <div class="filter-bar">
                <div class="search-container">
                    <i data-lucide="search"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Buscar paciente ou prontuário...">
                </div>
                <div class="filter-actions">
                    <select class="select-filter">
                        <option value="">Filtrar Colaborador</option>
                    </select>
                    <button class="btn-cadastrar" onclick="cadastrarColaborador()">
                        <i data-lucide="calendar-check"></i> Cadastrar
                    </button>
                </div>
            </div>

            <!-- TABELA -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 25%;">PACIENTE</th>
                            <th style="width: 20%;">CPF</th>
                            <th style="width: 25%;">TELEFONE</th>
                            <th style="width: 30%; text-align: center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="colaboradoresTable">
            
                    </tbody>
                </table>
            </div>

            
            <div class="pagination">
                <div id="paginationInfo">Mostrando 1 a 6 de 45 pacientes</div>
                <div class="pagination-controls">
                    <button class="pagination-btn" onclick="mudarPagina('prev')"><i data-lucide="chevron-left"></i></button>
                    <button class="pagination-btn" onclick="mudarPagina('next')"><i data-lucide="chevron-right"></i></button>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js/pagepadrao.js" ></script>
    
</body>
</html>
