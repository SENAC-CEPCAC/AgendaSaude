<!DOCTYPE html>
<html lang="pt-BR">
   <head>
      <meta charset="utf-8"/>
      <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
      <title>Agenda Saúde - Documentos</title>
      <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
      <link href="https://fonts.googleapis.com" rel="preconnect"/>
      <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
      <script id="tailwind-config">
         tailwind.config = {
             darkMode: "class",
             theme: {
                 extend: {
                     "colors": {
                         "tertiary-fixed-dim": "#ffb692",
                         "surface-container-lowest": "#ffffff",
                         "error": "#ba1a1a",
                         "on-primary-fixed-variant": "#114686",
                         "surface-container": "#ededf3",
                         "primary-fixed": "#d6e3ff",
                         "secondary": "#785a00",
                         "outline-variant": "#c3c6d2",
                         "inverse-on-surface": "#f0f0f6",
                         "error-container": "#ffdad6",
                         "surface-variant": "#e2e2e8",
                         "primary-fixed-dim": "#a9c7ff",
                         "surface-container-highest": "#e2e2e8",
                         "surface-container-low": "#f3f3f9",
                         "on-background": "#1a1c20",
                         "on-primary": "#ffffff",
                         "background": "#f9f9ff",
                         "tertiary-container": "#6d2b01",
                         "secondary-fixed": "#ffdf9d",
                         "on-error": "#ffffff",
                         "on-tertiary-fixed": "#341100",
                         "inverse-primary": "#a9c7ff",
                         "on-primary-container": "#82abf2",
                         "primary": "#002856",
                         "surface-dim": "#d9d9e0",
                         "on-primary-fixed": "#001b3d",
                         "surface-tint": "#325ea0",
                         "on-tertiary": "#ffffff",
                         "secondary-fixed-dim": "#f9bd00",
                         "on-tertiary-container": "#f29261",
                         "surface": "#f9f9ff",
                         "primary-container": "#003e7e",
                         "secondary-container": "#fdc008",
                         "on-secondary": "#ffffff",
                         "on-surface-variant": "#434750",
                         "outline": "#737781",
                         "on-secondary-fixed": "#251a00",
                         "on-tertiary-fixed-variant": "#773207",
                         "surface-container-high": "#e8e8ee",
                         "on-surface": "#1a1c20",
                         "surface-bright": "#f9f9ff",
                         "tertiary": "#4a1b00",
                         "on-error-container": "#93000a",
                         "on-secondary-fixed-variant": "#5b4300",
                         "on-secondary-container": "#6c5000",
                         "inverse-surface": "#2f3035",
                         "tertiary-fixed": "#ffdbcb"
                     },
                     "borderRadius": {
                         "DEFAULT": "0.25rem",
                         "lg": "0.5rem",
                         "xl": "0.75rem",
                         "full": "9999px"
                     },
                     "spacing": {
                         "unit": "4px",
                         "lg": "24px",
                         "gutter": "16px",
                         "margin": "20px",
                         "xs": "4px",
                         "xl": "32px",
                         "md": "16px",
                         "sm": "8px"
                     },
                     "fontFamily": {
                         "h3": ["Inter"],
                         "label-bold": ["Inter"],
                         "body-sm": ["Inter"],
                         "body-md": ["Inter"],
                         "body-lg": ["Inter"],
                         "h2": ["Inter"],
                         "label-md": ["Inter"],
                         "h1": ["Inter"]
                     },
                     "fontSize": {
                         "h3": ["20px", { "lineHeight": "28px", "letterSpacing": "0em", "fontWeight": "600" }],
                         "label-bold": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                         "body-sm": ["14px", { "lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400" }],
                         "body-md": ["16px", { "lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400" }],
                         "body-lg": ["18px", { "lineHeight": "28px", "letterSpacing": "0em", "fontWeight": "400" }],
                         "h2": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                         "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0em", "fontWeight": "500" }],
                         "h1": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                     }
                 }
             }
         }
      </script>
      <style>
         .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
      </style>
      <style>
         body {
         min-height: max(884px, 100dvh);
         }
      </style>
   </head>
   <body class="bg-surface-container-highest min-h-screen flex items-center justify-center antialiased">
      <!-- Mobile Device Simulator Wrapper -->
      <div class="relative w-full h-screen md:h-[844px] md:w-[390px] bg-background md:rounded-[2rem] md:shadow-[0_24px_48px_rgba(0,40,86,0.12)] md:border-[8px] md:border-surface-container-lowest overflow-hidden flex flex-col">
         <!-- Transactional Header (Suppressed Main Nav) -->
         <header class="flex-none bg-surface-container-lowest border-b border-surface-variant flex items-center px-margin h-16 z-10">
            <button aria-label="Voltar" class="w-10 h-10 -ml-2 flex items-center justify-center rounded-full hover:bg-surface-container-low active:bg-surface-variant transition-colors">
            <span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
            </button>
            <h1 class="font-h3 text-h3 text-primary ml-2">Agendamento</h1>
         </header>
         <!-- Progress Stepper -->
         <div class="flex-none bg-surface-container-lowest pt-sm pb-md px-margin border-b border-surface-variant shadow-sm z-10">
            <div class="flex justify-between items-center mb-xs">
               <span class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Passo 3 de 3</span>
               <span class="font-label-bold text-label-bold text-primary">3. Documentos</span>
            </div>
            <div class="w-full h-[4px] bg-surface-variant rounded-full overflow-hidden">
               <div class="w-full h-full bg-secondary-container rounded-full relative">
                  <!-- Glow effect on progress -->
                  <div class="absolute inset-0 bg-white/30 w-1/3 blur-[2px] animate-pulse"></div>
               </div>
            </div>
         </div>
         <!-- Main Content Area -->
         <main class="flex-1 overflow-y-auto p-margin pb-[100px] flex flex-col gap-lg bg-background">
            <!-- Instructions -->
            <div class="flex flex-col gap-xs">
               <h2 class="font-h2 text-h2 text-primary">Anexar Documentos</h2>
               <p class="font-body-sm text-body-sm text-on-surface-variant">
                  Para garantir um atendimento ágil, envie fotos claras ou arquivos PDF dos documentos solicitados abaixo.
               </p>
            </div>
            <!-- Upload Zone 1: RG/CPF -->
            <section class="flex flex-col gap-sm">
               <div class="flex items-center justify-between">
                  <label class="font-label-bold text-label-bold text-on-background">RG/CPF</label>
                  <span class="font-label-md text-label-md text-error bg-error-container px-2 py-0.5 rounded-sm">Obrigatório</span>
               </div>
               <button class="relative w-full flex flex-col items-center justify-center p-xl rounded-xl border-2 border-dashed border-outline-variant bg-surface hover:bg-surface-container-low active:bg-surface-container transition-all group overflow-hidden">
                  <div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center mb-md group-hover:scale-110 transition-transform">
                     <span class="material-symbols-outlined text-primary text-[32px]" data-icon="add_a_photo">add_a_photo</span>
                  </div>
                  <span class="font-h3 text-h3 text-primary mb-xs text-center">Tirar foto ou enviar</span>
                  <span class="font-body-sm text-body-sm text-on-surface-variant text-center">Tamanho máximo: 5MB</span>
               </button>
            </section>
            <!-- Upload Zone 2: Requisição Médica -->
            <section class="flex flex-col gap-sm">
               <div class="flex items-center justify-between">
                  <label class="font-label-bold text-label-bold text-on-background">Requisição Médica</label>
                  <span class="font-label-md text-label-md text-on-surface-variant bg-surface-variant px-2 py-0.5 rounded-sm">Se possuir</span>
               </div>
               <button class="relative w-full flex flex-col items-center justify-center p-xl rounded-xl border-2 border-dashed border-outline-variant bg-surface hover:bg-surface-container-low active:bg-surface-container transition-all group overflow-hidden">
                  <div class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center mb-md group-hover:scale-110 transition-transform">
                     <span class="material-symbols-outlined text-outline text-[32px]" data-icon="upload_file">upload_file</span>
                  </div>
                  <span class="font-h3 text-h3 text-on-surface mb-xs text-center">Adicionar arquivo</span>
                  <span class="font-body-sm text-body-sm text-on-surface-variant text-center">Toque para selecionar do dispositivo</span>
               </button>
            </section>
            <!-- Help Text Banner -->
            <div class="flex items-start gap-sm p-md bg-primary-fixed-dim/20 rounded-lg border border-primary-fixed-dim">
               <span class="material-symbols-outlined text-primary text-[20px] mt-0.5" data-icon="info">info</span>
               <p class="font-label-md text-label-md text-on-background">
                  Formatos aceitos: PDF, JPG, PNG
               </p>
            </div>
         </main>
         <!-- Fixed Bottom Action Bar -->
         <footer class="absolute bottom-0 w-full bg-surface-container-lowest border-t border-surface-variant px-margin py-md pb-safe z-20 shadow-[0_-8px_16px_rgba(0,40,86,0.03)]">
            <button class="w-full h-12 bg-primary hover:bg-primary-container active:opacity-90 text-on-primary rounded-DEFAULT flex items-center justify-center gap-2 transition-all shadow-sm">
            <span class="font-label-bold text-label-bold uppercase tracking-wide">Confirmar Agendamento</span>
            <span class="material-symbols-outlined text-[18px]" data-icon="check_circle">check_circle</span>
            </button>
         </footer>
      </div>
   </body>
</html>
