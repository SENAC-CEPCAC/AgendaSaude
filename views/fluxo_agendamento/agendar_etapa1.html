<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col relative selection:bg-primary-fixed selection:text-on-primary-fixed">

    <!-- Transactional Header (Nav Shell Suppressed) -->
    <header class="sticky top-0 z-50 w-full bg-surface-container-lowest/90 backdrop-blur-md border-b border-surface-variant px-margin h-16 flex items-center justify-between">

        <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95 text-on-surface" type="button">
            <span class="material-symbols-outlined text-[24px]">arrow_back</span>
        </button>

        <h1 class="font-h3 text-h3 text-primary truncate max-w-[200px]">Novo Agendamento</h1>

        <div class="w-10 h-10"></div> <!-- Spacer for centering -->

        </header>

        <!-- Main Content Canvas -->
        <main class="flex-1 w-full max-w-md mx-auto px-margin pb-32 flex flex-col gap-xl pt-md">

            <!-- Progress Stepper -->
            <div class="flex-none pt-sm pb-md border-surface-variant z-10">
                <div class="flex justify-between items-center mb-xs">
                    <span class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Passo 1 de 3</span>
                    <span class="font-label-bold text-label-bold text-primary">1. Seleção</span>
                </div>

                <div class="w-full h-[4px] bg-surface-variant rounded-full overflow-hidden">

                    <div class="w-1/3 h-full bg-secondary-container rounded-full relative">
                        <!-- Glow effect on progress -->
                        <div class="absolute inset-0 bg-white/30 w-1/3 blur-[2px] animate-pulse"></div>
                    </div>
                </div>
            </div>

            <!-- Dropdown: Especialidade -->
            <section class="flex flex-col gap-sm">
                <h2 class="font-h2 text-h2 text-on-background">Escolha a Especialidade</h2>
                <p class="font-body-sm text-body-sm text-on-surface-variant mb-unit">Selecione o tipo de atendimento que você precisa.</p>

                <button class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg p-md flex items-center justify-between text-left focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-fixed transition-all shadow-sm" type="button">
                    <span class="font-body-md text-body-md text-on-surface-variant">Selecione a especialidade...</span>
                    <span class="material-symbols-outlined text-outline">keyboard_arrow_down</span>
                </button>
            </section>
            
            <!-- List: Unidade Móvel Próxima -->
            <section class="flex flex-col gap-sm">

                <div class="flex items-center justify-between mb-unit">

                    <h2 class="font-h2 text-h2 text-on-background">Unidade Móvel Próxima</h2>

                    <button class="p-2 text-primary hover:bg-primary-fixed rounded-full transition-colors flex items-center justify-center" type="button">
                    <span class="material-symbols-outlined text-[20px]">my_location</span>
                    </button>
                </div>

                <div class="flex flex-col gap-gutter">

                    <!-- Card 1: Selected State -->
                    <label class="cursor-pointer group relative">
                        <input checked="" class="peer sr-only" name="unidade" type="radio"/>
                        <div class="bg-primary-fixed border-2 border-primary rounded-lg p-md flex gap-gutter items-center transition-all shadow-sm">

                            <!-- Thumbnail -->
                            <div class="w-16 h-16 shrink-0 rounded bg-surface-container overflow-hidden relative">
                            <img class="w-full h-full object-cover" data-alt="A sleek, modern mobile health clinic vehicle parked in a bright, clean urban plaza. The vehicle is white with subtle deep blue branding accents, reflecting the Corporate/Modern healthcare aesthetic. The lighting is sunny and optimistic, creating a sense of approachability and professional care. High-resolution, photorealistic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxEj0-ecMsREj9JA1xp2_b0-YArZhVDER53vC0AWqTMkd7d1IUp4QjNtZLrcI6wES3ZxNcRrccHyZwHyI1WKQpUpKAGz1mnyzIMOxnl9LeCHyPy1as-XWn--35cVnQ9xMEn8IXToZ4VRxWCnfoQDlfMwnBCugW5fxWbTslUVOtDHH-yUvl7jqp6CZkLgdKWvEmqcyAD9dGmUGFmzOh7WhDMUbaxT9cA9Zja2Ob7olQ6wHkC9Q1HpaOfGg88NpJW5kNpYq3MtEOehM"/>
                            </div>

                            <!-- Info -->
                            <div class="flex-1 flex flex-col gap-xs">
                                <div class="flex justify-between items-start">
                                    <h3 class="font-h3 text-h3 text-on-background leading-tight">Unidade Móvel Centro</h3>
                                    <span class="bg-primary text-on-primary font-label-bold text-label-bold px-2 py-0.5 rounded-full whitespace-nowrap">1.2 km</span>
                                </div>

                                <p class="font-body-sm text-body-sm text-on-surface-variant line-clamp-2">Praça da República, s/n - Centro</p>

                                <div class="flex items-center gap-xs mt-1">
                                <span class="w-2 h-2 rounded-full bg-[#10b981]"></span>
                                <span class="font-label-md text-label-md text-[#10b981]">Aberta agora</span>
                                </div>
                            </div>
                                <!-- Radio indicator -->
                                <div class="w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center shrink-0">
                                <div class="w-3 h-3 rounded-full bg-primary"></div>
                            </div>
                        </div>
                    </label>

                    <!-- Card 2: Default State -->
                    <label class="cursor-pointer group relative">
                        <input class="peer sr-only" name="unidade" type="radio"/>

                        <div class="bg-surface-container-lowest border border-surface-variant rounded-lg p-md flex gap-gutter items-center transition-all shadow-sm hover:border-outline peer-focus-visible:ring-2 peer-focus-visible:ring-primary">

                            <!-- Thumbnail -->
                            <div class="w-16 h-16 shrink-0 rounded bg-surface-container overflow-hidden relative flex items-center justify-center text-outline">
                                <span class="material-symbols-outlined text-[32px]">rv_hookup</span>
                            </div>

                            <!-- Info -->
                            <div class="flex-1 flex flex-col gap-xs">
                                <div class="flex justify-between items-start">
                                <h3 class="font-h3 text-h3 text-on-background leading-tight">Unidade Zona Sul</h3>
                                <span class="bg-surface-container-highest text-on-surface-variant font-label-bold text-label-bold px-2 py-0.5 rounded-full whitespace-nowrap">3.5 km</span>
                            </div>

                            <p class="font-body-sm text-body-sm text-on-surface-variant line-clamp-2">Av. das Nações, 1500 - Estacionamento Supermercado</p>

                            <div class="flex items-center gap-xs mt-1">
                                <span class="w-2 h-2 rounded-full bg-outline"></span>
                                <span class="font-label-md text-label-md text-outline">Fechada temporariamente</span>
                            </div>
                        </div>

                            <!-- Radio indicator -->
                            <div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center shrink-0 group-hover:border-outline transition-colors">

                                <div class="w-3 h-3 rounded-full bg-transparent"></div>
                            
                            </div>
                        </div>
                    </label>

                </div>

            </section>

        </main>

        <!-- Bottom Action Area -->
        <footer class="fixed bottom-0 left-0 w-full p-margin flex justify-center z-40" class="footer"></footer>
    </body>
</html>
